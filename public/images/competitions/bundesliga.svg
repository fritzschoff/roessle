<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Red background pill -->
  <rect width="80" height="80" rx="6" fill="#D20515"/>
  <!-- Player silhouette (white) - kicking figure -->
  <!-- Head -->
  <circle cx="40" cy="13" r="7" fill="white"/>
  <!-- Torso -->
  <path d="M33 22 Q40 20 47 22 L50 42 Q40 46 30 42 Z" fill="white"/>
  <!-- Left arm out -->
  <path d="M33 27 L18 23" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Right arm raised -->
  <path d="M47 27 L60 19" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Standing left leg -->
  <path d="M35 42 L31 58 L28 68" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Kicking right leg -->
  <path d="M45 42 L56 50 L66 46" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Ball -->
  <circle cx="68" cy="43" r="7" fill="none" stroke="white" stroke-width="3.5"/>
  <!-- Ball cross pattern -->
  <path d="M61 43 L75 43 M68 36 L68 50" stroke="white" stroke-width="1.5" opacity="0.7"/>
</svg>
