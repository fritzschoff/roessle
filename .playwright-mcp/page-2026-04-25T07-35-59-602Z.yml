              - strong [ref=e20]: Cannstatter Kurve Berlin (CKB'08)
              - text: ist der erste offizielle Fanclub des VfB Stuttgart in der Hauptstadt. Gegründet 2008 vereinen wir VfB-Fans jeglichen Alters, Herkunft und Lebensmodells. Uns verbindet die Leidenschaft für den roten Brustring und den schwäbischen Charme. Wir positionieren uns gegen jegliche Art von Diskriminierung.
